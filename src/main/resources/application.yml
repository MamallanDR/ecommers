server:
  port: 8080

logging:
  level:
    org.springframework.security: debug

spring:
  application:
    name: ecommerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    password: root
    driver-class-name: org.postgresql.Driver
    username: postgres

  devtools:
    restart:
      enabled: true
  jpa:
    hibernate:
     ddl-auto: update
     show-sql: true

    properties:
      hibernate:
       dialect : org.hibernate.dialect.PostgreSQLDialect


